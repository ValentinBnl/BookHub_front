<svg [attr.width]="size()" [attr.height]="size()" viewBox="0 0 24 24" fill="none"
  stroke="currentColor" [attr.stroke-width]="strokeWidth()" stroke-linecap="round" stroke-linejoin="round">
  @switch (name()) {
    @case ('home') {
      <path d="M3 11L12 3l9 8v9a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1z"/>
    }
    @case ('catalog') {
      <path d="M4 5a2 2 0 0 1 2-2h5v18H6a2 2 0 0 1-2-2V5zm9-2h5a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-5V3z"/>
    }
    @case ('borrow') {
      <path d="M4 4h12a2 2 0 0 1 2 2v14l-7-4-7 4V6a2 2 0 0 1 2-2z"/>
    }
    @case ('settings') {
      <circle cx="12" cy="12" r="3"/>
      <path d="M12 2v3m0 14v3M4.2 4.2l2.1 2.1m11.3 11.3 2.1 2.1M2 12h3m14 0h3M4.2 19.8l2.1-2.1m11.3-11.3 2.1-2.1"/>
    }
    @case ('logout') {
      <path d="M10 17l-5-5 5-5m-5 5h11m-3-9h5a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-5"/>
    }
    @case ('search') {
      <circle cx="11" cy="11" r="7"/>
      <path d="m20 20-4-4"/>
    }
    @case ('bell') {
      <path d="M6 8a6 6 0 0 1 12 0v5l2 4H4l2-4V8zm4 12a2 2 0 0 0 4 0"/>
    }
    @case ('profile') {
      <circle cx="12" cy="8" r="4"/>
      <path d="M4 21c0-5 3-7 8-7s8 2 8 7"/>
    }
    @case ('heart') {
      <path d="M12 20S4 14 4 9a4 4 0 0 1 8-2 4 4 0 0 1 8 2c0 5-8 11-8 11z"/>
    }
    @case ('history') {
      <path d="M3 12a9 9 0 1 0 3-6L3 9m0-5v5h5"/><path d="M12 7v5l3 2"/>
    }
    @case ('bookmark') {
      <path d="M6 3h12v18l-6-4-6 4V3z"/>
    }
    @case ('clock') {
      <circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>
    }
    @case ('star') {
      <path d="M12 3l2.5 6 6.5.5-5 4.5 1.5 6.5L12 17l-5.5 3.5 1.5-6.5L3 9.5l6.5-.5z"/>
    }
    @case ('plus') {
      <path d="M12 5v14M5 12h14"/>
    }
    @case ('users') {
      <circle cx="9" cy="8" r="3.5"/>
      <path d="M2 20c0-4 3-6 7-6s7 2 7 6"/>
      <circle cx="17" cy="7" r="2.5"/>
      <path d="M15 14c4 0 7 2 7 5"/>
    }
    @case ('book') {
      <path d="M4 4h6c1 0 2 1 2 2v14c0-1-1-2-2-2H4V4zm16 0h-6c-1 0-2 1-2 2v14c0-1 1-2 2-2h6V4z"/>
    }
    @case ('chevron-right') {
      <path d="M9 5l7 7-7 7"/>
    }
    @case ('arrow-right') {
      <path d="M4 12h16m-6-6 6 6-6 6"/>
    }
    @case ('check') {
      <path d="M4 12l6 6L20 6"/>
    }
    @case ('chevron-down') {
      <path d="M6 9l6 6 6-6"/>
    }
    @case ('grid') {
      <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
      <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
    }
    @case ('list') {
      <path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/>
    }
    @case ('share') {
    <circle cx="18" cy="5" r="3"/>
    <circle cx="6" cy="12" r="3"/>
    <circle cx="18" cy="19" r="3"/>
    <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
    <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
}
@default {
      <circle cx="12" cy="12" r="5"/>
    }
  }
</svg>
