<header class="topbar">
  <div class="search-wrapper">
    <span class="search-icon">
      <app-icon name="search" [size]="17" />
    </span>
    <input
      type="text"
      placeholder="Rechercher un livre, un auteur, une catégorie..."
      class="search-input"
      (keyup.enter)="search($event)"
    />
  </div>

  <div class="actions">
    <div class="avatar">{{ initials() }}</div>
  </div>
</header>
