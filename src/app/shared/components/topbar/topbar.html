<header class="topbar">
  <div class="search-wrapper">
    <span class="search-icon">
      <app-icon name="search" [size]="17" />
    </span>
    <input type="text" placeholder="Rechercher un livre, un auteur, une catégorie..." class="search-input" />
  </div>

  <div class="actions">
    <button class="action-btn" aria-label="Notifications">
      <app-icon name="bell" [size]="17" />
      <span class="notif-dot"></span>
    </button>

    <div class="avatar">AG</div>
  </div>
</header>
